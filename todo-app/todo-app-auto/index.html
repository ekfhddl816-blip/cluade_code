<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 할 일</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="date-label" id="date-label"></span>
      <h1>오늘 할 일</h1>
      <p class="subtitle">작은 것부터 하나씩 ✦</p>
    </div>

    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="무엇을 해야 할까요..."
        maxlength="100"
        autocomplete="off"
      />
      <button id="add-btn">+</button>
    </div>

    <ul id="todo-list"></ul>

    <p id="empty-msg" class="empty">✦ 오늘의 할 일을 적어보세요 ✦</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
